<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Activity | SUP</title>
  <meta name="description" content="Your private activity dashboard on SUP">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div id="navbar-placeholder"></div>

  <div class="container">
    <div id="sidebar-left-placeholder"></div>

    <main class="page-main">

      <!-- Profile Hero -->
      <div class="profile-hero animate-up" id="profile-hero-card">
        <div class="profile-hero-banner"></div>
        <div class="profile-hero-body">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar">
              <i class="fas fa-user-secret"></i>
            </div>
          </div>
          <div class="profile-info-main">
            <h1 class="profile-display-name">Anonymous</h1>
            <div class="profile-badges" id="profile-badges">
              <span class="badge badge-user"><i class="fas fa-user"></i> User</span>
              <span class="badge badge-karma" id="profile-karma-badge"><i class="fas fa-star"></i> 0 karma</span>
            </div>
            <p style="font-size:12px;color:var(--text-muted);margin-top:10px;">
              <i class="fas fa-lock" style="margin-right:5px;"></i>
              Only you can see this dashboard. All public posts remain fully anonymous.
            </p>
          </div>
          <div id="profile-stats" style="display:flex;gap:24px;align-self:center;">
            <div style="text-align:center;">
              <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text-bright);" id="stat-posts">—</div>
              <div style="font-size:11px;color:var(--text-muted);">Posts</div>
            </div>
            <div style="text-align:center;">
              <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text-bright);" id="stat-comments">—</div>
              <div style="font-size:11px;color:var(--text-muted);">Comments</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Admin Banner (shown only for admins) -->
      <div id="admin-banner" style="display:none;" class="animate-up">
        <div style="background:linear-gradient(135deg,rgba(245,200,66,0.07),rgba(22,17,31,0.99));border:1px solid rgba(245,200,66,0.2);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.3);display:flex;align-items:center;justify-content:center;color:var(--gold-mid);font-size:18px;flex-shrink:0;">
            <i class="fas fa-crown"></i>
          </div>
          <div>
            <p style="font-weight:700;color:var(--gold-mid);font-size:14px;">Administrator Account</p>
            <p style="font-size:12px;color:var(--text-secondary);">You have elevated privileges — you can delete any post or comment on the platform.</p>
          </div>
        </div>
      </div>

      <!-- Activity Tabs -->
      <div class="profile-tabs animate-up-delay-1">
        <button class="profile-tab active" id="tab-posts" data-tab="posts">
          <i class="fas fa-file-lines"></i> My Posts
        </button>
        <button class="profile-tab" id="tab-comments" data-tab="comments">
          <i class="fas fa-comments"></i> My Comments
        </button>
      </div>

      <!-- Activity Content -->
      <div id="profile-activity-list" class="animate-up-delay-2">
        <div class="skeleton-card"><div class="skeleton-item skeleton-title"></div><div class="skeleton-item skeleton-text"></div><div class="skeleton-item skeleton-meta"></div></div>
        <div class="skeleton-card"><div class="skeleton-item skeleton-title"></div><div class="skeleton-item skeleton-text"></div><div class="skeleton-item skeleton-meta"></div></div>
      </div>
    </main>

    <div id="sidebar-right-placeholder"></div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { initLayout, requireAuth, getUserKarma } from './js/auth.js';
    import { fetchUserPosts, fetchUserComments } from './js/profiles.js';
    import { renderPostCardHTML } from './js/posts.js';
    import { initVotingListeners, voteOnComment } from './js/votes.js';
    import { showToast } from './js/utils.js';

    let currentUser = null;
    let currentTab = 'posts';
    let userPosts = [];
    let userComments = [];

    document.addEventListener('DOMContentLoaded', async () => {
      currentUser = await requireAuth();
      if (!currentUser) return;

      await initLayout();

      const role = currentUser.user_metadata?.role || 'user';
      const isAdmin = role === 'admin';

      // Set role badge
      const badgesEl = document.getElementById('profile-badges');
      if (badgesEl) {
        const roleBadge = isAdmin
          ? `<span class="badge badge-admin"><i class="fas fa-crown"></i> Admin</span>`
          : `<span class="badge badge-user"><i class="fas fa-user"></i> User</span>`;
        badgesEl.innerHTML = roleBadge + badgesEl.innerHTML.replace(/<span class="badge badge-user">.*?<\/span>/, '');
      }

      if (isAdmin) {
        document.getElementById('admin-banner').style.display = 'block';
      }

      // Load karma
      const karma = await getUserKarma(currentUser.id);
      const karmaBadge = document.getElementById('profile-karma-badge');
      if (karmaBadge) karmaBadge.innerHTML = `<i class="fas fa-star"></i> ${karma} karma`;

      // Load activity
      await loadActivity();

      setupTabListeners();
      initVotingListeners(document.getElementById('profile-activity-list'));
      setupCommentVoteListeners();
    });

    async function loadActivity() {
      const container = document.getElementById('profile-activity-list');
      container.innerHTML = `
        <div class="skeleton-card"><div class="skeleton-item skeleton-title"></div><div class="skeleton-item skeleton-text"></div></div>
        <div class="skeleton-card"><div class="skeleton-item skeleton-title"></div><div class="skeleton-item skeleton-text"></div></div>
      `;

      if (currentTab === 'posts') {
        const { data: posts, error } = await fetchUserPosts(currentUser.id);

        if (error) {
          container.innerHTML = `<div class="empty-state"><span class="empty-icon">⚠️</span><h3 class="empty-title">Error</h3><p class="empty-text">Failed to load posts.</p></div>`;
          return;
        }

        userPosts = posts || [];
        document.getElementById('stat-posts').textContent = userPosts.length;

        if (userPosts.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">🌸</span>
              <h3 class="empty-title">No posts yet</h3>
              <p class="empty-text">Create your first anonymous post in any community!</p>
              <a href="create-post.html" class="btn btn-primary" style="margin-top:20px;">Create Post</a>
            </div>
          `;
          return;
        }

        container.innerHTML = posts.map(post => renderPostCardHTML(post)).join('');

      } else {
        const { data: comments, error } = await fetchUserComments(currentUser.id);

        if (error) {
          container.innerHTML = `<div class="empty-state"><span class="empty-icon">⚠️</span><h3 class="empty-title">Error</h3><p class="empty-text">Failed to load comments.</p></div>`;
          return;
        }

        userComments = comments || [];
        document.getElementById('stat-comments').textContent = userComments.length;

        if (userComments.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">💬</span>
              <h3 class="empty-title">No comments yet</h3>
              <p class="empty-text">Explore the feed and join some conversations anonymously.</p>
              <a href="index.html" class="btn btn-ghost" style="margin-top:20px;">Browse Feed</a>
            </div>
          `;
          return;
        }

        container.innerHTML = comments.map(c => {
          const isUp = c.userVote === 1;
          const isDown = c.userVote === -1;
          const postTitle = c.posts ? c.posts.title : 'Deleted Post';
          const postLink = c.posts ? `post.html?id=${c.posts.id}` : '#';
          return `
            <div class="comment-node" style="margin-top:0;margin-bottom:12px;" id="cnode-${c.id}">
              <div class="comment-content">
                <div class="comment-vote-panel">
                  <button class="vote-btn up ${isUp ? 'active' : ''}" data-comment-id="${c.id}" aria-label="Upvote"><i class="fas fa-arrow-up"></i></button>
                  <span class="vote-score ${isUp ? 'up-active' : ''} ${isDown ? 'down-active' : ''}" id="cscore-${c.id}">${c.score}</span>
                  <button class="vote-btn down ${isDown ? 'active' : ''}" data-comment-id="${c.id}" aria-label="Downvote"><i class="fas fa-arrow-down"></i></button>
                </div>
                <div>
                  <div class="comment-meta">
                    <span>Commented on</span>
                    <a href="${postLink}" style="color:var(--sakura-mid);font-weight:600;">${postTitle}</a>
                    <span>• ${new Date(c.created_at).toLocaleDateString()}</span>
                  </div>
                  <div class="comment-body">${c.body}</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function setupTabListeners() {
      const tabs = document.querySelectorAll('.profile-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          if (tab.classList.contains('active')) return;
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentTab = tab.dataset.tab;
          loadActivity();
        });
      });
    }

    function setupCommentVoteListeners() {
      const container = document.getElementById('profile-activity-list');
      container.addEventListener('click', async (e) => {
        const voteBtn = e.target.closest('.vote-btn');
        if (!voteBtn || !voteBtn.dataset.commentId) return;
        e.preventDefault(); e.stopPropagation();

        const commentId = voteBtn.dataset.commentId;
        const value = voteBtn.classList.contains('up') ? 1 : -1;
        voteBtn.style.pointerEvents = 'none'; voteBtn.style.opacity = '0.5';
        const { success, newValue, delta } = await voteOnComment(commentId, value);
        voteBtn.style.pointerEvents = ''; voteBtn.style.opacity = '';

        if (success) {
          const cNode = document.getElementById(`cnode-${commentId}`);
          if (cNode) {
            const upBtn = cNode.querySelector('.vote-btn.up');
            const downBtn = cNode.querySelector('.vote-btn.down');
            const scoreSpan = cNode.querySelector(`#cscore-${commentId}`);
            if (scoreSpan) {
              scoreSpan.textContent = (parseInt(scoreSpan.textContent) || 0) + delta;
              scoreSpan.classList.remove('up-active','down-active');
              if (newValue === 1) scoreSpan.classList.add('up-active');
              if (newValue === -1) scoreSpan.classList.add('down-active');
            }
            if (upBtn && downBtn) {
              upBtn.classList.remove('active'); downBtn.classList.remove('active');
              if (newValue === 1) upBtn.classList.add('active');
              if (newValue === -1) downBtn.classList.add('active');
            }
          }
        }
      });
    }
  </script>
</body>
</html>
